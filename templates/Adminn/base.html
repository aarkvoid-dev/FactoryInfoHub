{% extends "admin/base.html" %}
{% load static %}

{% block extrahead %}
    {{ block.super }}
    <!-- Custom admin CSS to override any conflicting styles from main site -->
    <style>
        /* Reset any global styles that might interfere with admin */
        .djn-admin .module table, 
        .djn-admin .form-row input,
        .djn-admin .form-row select,
        .djn-admin .form-row textarea {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Ensure admin filters work properly */
        .djn-admin .module .submit-row {
            clear: both;
            padding: 10px 0;
            border-top: 1px solid #eee;
            margin-top: 10px;
        }

        /* Fix filter sidebar */
        .djn-admin .module .actions {
            border-top: 1px solid #eee;
            padding-top: 10px;
            margin-top: 10px;
        }

        /* Ensure admin forms are styled correctly */
        .djn-admin .form-row {
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #eee;
            border-radius: 4px;
        }

        /* Fix admin table styles */
        .djn-admin .module table thead th {
            background: #f8f8f8;
            border-bottom: 2px solid #ddd;
            font-weight: bold;
        }

        .djn-admin .module table tbody td {
            border-bottom: 1px solid #eee;
            padding: 8px;
        }

        /* Fix admin filter widgets */
        .djn-admin .form-row select,
        .djn-admin .form-row input[type="text"],
        .djn-admin .form-row input[type="date"] {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #ccc;
            border-radius: 3px;
            background: white;
        }

        /* Ensure admin buttons work */
        .djn-admin .submit-row input[type="submit"] {
            background: #007cba;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 3px;
            cursor: pointer;
        }

        .djn-admin .submit-row input[type="submit"]:hover {
            background: #005a87;
        }

        /* Fix admin pagination */
        .djn-admin .paginator {
            margin: 10px 0;
            text-align: center;
        }

        .djn-admin .paginator a, 
        .djn-admin .paginator span.this-page {
            display: inline-block;
            padding: 6px 12px;
            margin: 0 2px;
            border: 1px solid #ddd;
            background: white;
            text-decoration: none;
            color: #333;
        }

        .djn-admin .paginator span.this-page {
            background: #007cba;
            color: white;
            border-color: #007cba;
        }

        /* Fix admin filter sidebar layout */
        .djn-admin #changelist-filter {
            position: fixed;
            top: 52px;
            right: 0;
            width: 240px;
            height: calc(100% - 52px);
            background: #f8f9fa;
            border-left: 1px solid #e9ecef;
            padding: 15px;
            overflow-y: auto;
            z-index: 100;
        }

        .djn-admin #changelist {
            margin-right: 240px;
        }

        .djn-admin #changelist-filter h2 {
            font-size: 14px;
            font-weight: 600;
            color: #495057;
            margin: 0 0 10px 0;
            border-bottom: 1px solid #dee2e6;
            padding-bottom: 5px;
        }

        .djn-admin #changelist-filter details {
            margin-bottom: 15px;
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 4px;
        }

        .djn-admin #changelist-filter summary {
            padding: 8px 12px;
            background: #e9ecef;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            border-bottom: 1px solid #dee2e6;
        }

        .djn-admin #changelist-filter summary:hover {
            background: #dee2e6;
        }

        .djn-admin #changelist-filter ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .djn-admin #changelist-filter li {
            padding: 6px 12px;
            border-bottom: 1px solid #f1f3f4;
        }

        .djn-admin #changelist-filter li:last-child {
            border-bottom: none;
        }

        .djn-admin #changelist-filter li a {
            color: #495057;
            text-decoration: none;
            display: block;
            font-size: 13px;
        }

        .djn-admin #changelist-filter li.selected a {
            color: #007cba;
            font-weight: 600;
        }

        .djn-admin #changelist-filter li a:hover {
            color: #005a87;
        }

        /* Fix search bar positioning */
        .djn-admin #toolbar {
            margin-right: 240px;
            background: white;
            border-bottom: 1px solid #e9ecef;
            padding: 10px;
        }

        .djn-admin #toolbar form {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .djn-admin #toolbar input[type="text"] {
            flex: 1;
            min-width: 300px;
            padding: 8px 12px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 14px;
        }

        .djn-admin #toolbar input[type="submit"] {
            padding: 8px 16px;
            background: #007cba;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .djn-admin #toolbar input[type="submit"]:hover {
            background: #005a87;
        }

        /* Responsive adjustments */
        @media (max-width: 1200px) {
            .djn-admin #changelist-filter {
                width: 200px;
            }
            .djn-admin #changelist {
                margin-right: 200px;
            }
            .djn-admin #toolbar input[type="text"] {
                min-width: 250px;
            }
        }

        @media (max-width: 992px) {
            .djn-admin #changelist-filter {
                position: relative;
                top: 0;
                width: 100%;
                height: auto;
                margin-bottom: 15px;
                border: 1px solid #e9ecef;
                border-radius: 4px;
            }
            .djn-admin #changelist {
                margin-right: 0;
            }
            .djn-admin #toolbar {
                margin-right: 0;
            }
            .djn-admin #toolbar input[type="text"] {
                min-width: 200px;
            }
        }

        @media (max-width: 768px) {
            .djn-admin #changelist-filter {
                display: none;
            }
            .djn-admin #changelist {
                margin-right: 0;
            }
            .djn-admin #toolbar {
                margin-right: 0;
            }
            .djn-admin #toolbar input[type="text"] {
                min-width: 150px;
                flex: 1;
            }
        }
    </style>
{% endblock %}

{% block bodyclass %}{{ block.super }} djn-admin{% endblock %}
