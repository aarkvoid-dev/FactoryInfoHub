{% extends 'CustomAdmin/base.html' %}

{% block title %}Access Denied{% endblock %}

{% block content %}
<div class="container-fluid py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body text-center py-5">
                    <div class="mb-4">
                        <i class="fas fa-lock text-danger" style="font-size: 4rem;"></i>
                    </div>
                    <h2 class="h4 fw-bold mb-3">Access Denied</h2>
                    <p class="text-muted mb-4">
                        You don't have permission to access this page. Please contact your administrator if you believe this is a mistake.
                    </p>
                    <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                        <a href="{% url 'admin_interface:admin_dashboard' %}" class="btn btn-primary rounded-pill px-4 py-2">
                            <i class="fas fa-home me-2"></i>Go to Dashboard
                        </a>
                        <a href="javascript:history.back()" class="btn btn-outline-secondary rounded-pill px-4 py-2">
                            <i class="fas fa-arrow-left me-2"></i>Go Back
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
